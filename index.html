<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Canvas – SW Studio HW1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="topbar">
    <div id="topbar-title">Software Studio HW1: Web Canvas (by 110006226)</div>
  </header>

  <div id="app">

    <!-- LEFT PANEL -->
    <aside id="left-panel">

      <div class="panel-section">
        <div class="section-title">🎨 Tools</div>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="brush"      id="btn-brush">✏️ Brush</button>
          <button class="tool-btn"        data-tool="eraser"     id="btn-eraser">🧹 Eraser</button>
          <button class="tool-btn"        data-tool="text"       id="btn-text">📝 Text</button>
          <button class="tool-btn"        data-tool="image"      id="btn-image">🖼️ Image</button>
          <button class="tool-btn"        data-tool="eyedropper" id="btn-eyedropper">💉 Picker</button>
          <button class="tool-btn"        data-tool="bucket"     id="btn-bucket">🪣 Fill</button>
          <button class="tool-btn"        data-tool="spray"      id="btn-spray">💨 Spray</button>
        </div>
        <input type="file" id="image-file" accept="image/*" style="display:none" />
      </div>

      <div class="panel-section">
        <div class="section-title">📏 Brush Size</div>
        <div class="slider-row">
          <input type="range" id="brush-size" min="1" max="100" value="10" />
          <span id="size-label">10 px</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title">🔤 Text Settings</div>
        <select id="font-family">
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="'Courier New'">Courier New</option>
          <option value="'Times New Roman'">Times New Roman</option>
          <option value="Verdana">Verdana</option>
        </select>
        <select id="font-size">
          <option value="12">12 px</option>
          <option value="16">16 px</option>
          <option value="20" selected>20 px</option>
          <option value="24">24 px</option>
          <option value="32">32 px</option>
          <option value="48">48 px</option>
          <option value="64">64 px</option>
        </select>
        <button id="rasterize-btn" class="wide-btn">Flatten Text to Canvas</button>
      </div>

      <div class="panel-section" id="layers-section">
        <div class="section-title">🗂️ Layers</div>
        <div id="layer-list"></div>
        <button id="add-layer-btn" class="wide-btn">+ Add Layer</button>
      </div>

      <div class="panel-section">
        <button id="refresh-btn" class="wide-btn danger-btn">🔄 Refresh Canvas</button>
      </div>

    </aside>

    <!-- CANVAS AREA -->
    <main id="canvas-area">
      <div id="canvas-container">
        <canvas id="preview-canvas"></canvas>
        <input id="text-input" type="text" placeholder="type here…"
               autocomplete="off" spellcheck="false" />
      </div>
    </main>

    <!-- RIGHT PANEL -->
    <aside id="right-panel">

      <div class="panel-section">
        <div class="section-title">⬛ Shapes</div>
        <div class="tool-grid">
          <button class="tool-btn" data-tool="rect"     id="btn-rect">▭ Rect</button>
          <button class="tool-btn" data-tool="circle"   id="btn-circle">⬭ Circle</button>
          <button class="tool-btn" data-tool="triangle" id="btn-triangle">▲ Triangle</button>
        </div>
        <label class="check-label">
          <input type="checkbox" id="shape-fill" /> Fill shape
        </label>
      </div>

      <div class="panel-section">
        <div class="section-title">🌈 Color</div>
        <canvas id="sv-canvas" width="180" height="150"></canvas>
        <canvas id="hue-canvas" width="180" height="16"></canvas>
        <div id="color-row">
          <div id="color-box"></div>
          <span id="color-label">rgb(0, 0, 0)</span>
        </div>
        <div class="section-title" style="margin-top:8px;">Recent</div>
        <div id="recent-swatches"></div>
      </div>

      <div class="panel-section">
        <div class="section-title">⚡ Actions</div>
        <div class="btn-row">
          <button id="undo-btn" class="half-btn">↩ Undo</button>
          <button id="redo-btn" class="half-btn">↪ Redo</button>
        </div>
        <button id="download-btn" class="wide-btn">⬇️ Download PNG</button>
      </div>

      <div class="panel-section">
        <div class="section-title">🗒️ Paper</div>
        <div class="template-grid">
          <button class="tpl-btn" data-bg="#ffffff">⬜ White</button>
          <button class="tpl-btn" data-bg="#1a1a1a">⬛ Black</button>
          <button class="tpl-btn" data-bg="#fffde7">🟡 Pastel</button>
          <button class="tpl-btn" data-bg="#e3f2fd">🔵 Sky</button>
          <button class="tpl-btn" data-bg="#fce4ec">🩷 Pink</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-title">📐 Canvas Size</div>
        <div class="dim-row">
          <label>W <input type="number" id="canvas-w" value="800" min="100" max="3000" /></label>
          <label>H <input type="number" id="canvas-h" value="600" min="100" max="3000" /></label>
        </div>
        <button id="resize-btn" class="wide-btn">Apply Size</button>
      </div>

      <div class="panel-section">
        <div class="section-title">🔃 Rotate Canvas</div>
        <div class="btn-row">
          <button id="rotate-ccw-btn" class="half-btn">↺ CCW</button>
          <button id="rotate-cw-btn"  class="half-btn">↻ CW</button>
        </div>
      </div>

    </aside>
  </div>

  <!-- MOBILE BOTTOM TOOLBAR -->
  <div id="mobile-bar">
    <button class="mob-btn active" data-tool="brush">✏️</button>
    <button class="mob-btn" data-tool="eraser">🧹</button>
    <button class="mob-btn" data-tool="text">📝</button>
    <button class="mob-btn" data-tool="bucket">🪣</button>
    <button class="mob-btn" data-tool="spray">💨</button>
    <button class="mob-btn" data-tool="rect">▭</button>
    <button class="mob-btn" data-tool="circle">⬭</button>
    <button class="mob-btn" data-tool="triangle">▲</button>
    <button class="mob-btn" data-tool="eyedropper">💉</button>
    <div id="mob-color-swatch"></div>
    <button class="mob-btn" id="mob-undo">↩</button>
    <button class="mob-btn" id="mob-redo">↪</button>
    <button class="mob-btn" id="mob-download">⬇️</button>
  </div>

  <!-- Mobile color picker modal -->
  <div id="mob-color-modal">
    <div id="mob-color-inner">
      <div class="section-title">🌈 Color Picker</div>
      <canvas id="sv-canvas-mob" width="260" height="200"></canvas>
      <canvas id="hue-canvas-mob" width="260" height="20"></canvas>
      <div id="color-row-mob">
        <div id="color-box-mob"></div>
        <span id="color-label-mob">rgb(0,0,0)</span>
      </div>
      <div id="recent-swatches-mob"></div>
      <button id="mob-color-close" class="wide-btn" style="margin-top:10px;">✓ Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
